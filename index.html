<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <header>
             <h1 class=" text-4xl text-[#002C5C] font-extrabold w-[80%] mx-auto mt-[60px]">Job Application Tracker</h1>
    <div id="uppv_container" class="grid grid-cols-3 w-[80%] mx-auto my-[20] gap-16">
        <div id="upper_div" class="border border-red-300 w-[360px] h-[97px] bg-green-50 font-bold">
              <p>Total</p>
              <span class="text-3xl">0</span>
        </div>
        <div id="upper_div"  class="border border-red-300 w-[360px] h-[97px] bg-green-50 font-bold">
            <p>Interview</p>
            <span class="text-3xl">0</span>
        </div>
        <div id="upper_div"   class="border border-red-300 w-[360px] h-[97px] bg-green-50 font-bold"><p>Rejected</p>
        <span class="text-3xl/895">0</span></div>
    </div>
    </header>

    <hr class="mt-[30px] w-[80%] mx-auto">

    <section>
        <h2 class="text-2xl text-[#002C5C] font-bold w-[80%] mx-auto mt-[20px]">Available Jobs</h2>
        <div class="flex gap-4 border border-red-300 w-[80%] mx-auto mt-[20px] items-start">
            <button class="w-[80px] h-[32px] border border-2">
                  All
            </button>
            <button class="w-[80px] h-[32px] border border-2">
                  Interview
            </button>
            <button class="w-[80px] h-[32px] border border-2">
                  Rejected
            </button>
        </div>
    </section>
